<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title></title>
    <link rel="stylesheet" href="/css/styles.css">
  </head>
  <body class="chat">

    <div class="chat__sidebar">
      <h3>People</h3>
      <div id="users"></div>
    </div>

    <div class="chat__main">
      <ol class="chat__messages" id="messages"></ol>
      <div class="chat__footer">
        <form class="" id=message-form action="index.html" method="post">
          <input type="text" name="message" placeholder="Message" autofocus autocomplete="off"/>
          <button type="submit" name="button">Send</button>
        </form>
        <button id="send-location" type="button" name="send-location">Send Location</button>
      </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.18.1/moment.min.js"></script>
    <script src="/js/index.js"></script>
  </body>
</html>
